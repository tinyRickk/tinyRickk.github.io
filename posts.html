  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      --primary-color: #00d4ff;
      --secondary-color: #ff006e;
      --text-light: #e0e0e0;
      --text-lighter: #b0b0b0;
      --bg-dark: #0a0e27;
      --bg-darker: #050812;
      --card-bg: #1a1f3a;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-light);
      line-height: 1.6;
      overflow-x: hidden;
    }
    
    h1, h2, h3, h4, h5, h6 {
      font-weight: 600;
      color: var(--text-light);
    }
    
    h1 { font-size: 2.8rem; font-weight: 700; }
    h2 { font-size: 2rem; font-weight: 700; }
    h3 { font-size: 1.4rem; font-weight: 600; }
    
    /* Navbar */
    .navbar {
      background: rgba(10, 14, 39, 0.95) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 212, 255, 0.2);
      padding: 1rem 0;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }
    
    .navbar-brand {
      font-weight: 700;
      font-size: 1.4rem;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .nav-link {
      color: var(--text-lighter) !important;
      transition: all 0.3s ease;
      position: relative;
      padding: 0.5rem 1rem;
    }
    
    .nav-link:hover {
      color: var(--primary-color) !important;
    }
    
    .nav-link::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary-gradient);
      transition: width 0.3s ease;
    }
    
    .nav-link:hover::after {
      width: 100%;
    }
    
    /* Main content */
    section {
      padding: 4rem 0;
      border-top: 1px solid rgba(0, 212, 255, 0.1);
    }
    
    section:nth-child(even) {
      background: rgba(0, 212, 255, 0.02);
    }
    
    .section-title {
      font-size: 2.5rem;
      margin-bottom: 3rem;
      position: relative;
      padding-bottom: 1rem;
    }
    
    .section-title::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 60px;
      height: 4px;
      background: var(--primary-gradient);
      border-radius: 2px;
    }
    
    /* Article Card */
    .article-card {
      background: var(--card-bg);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 12px;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
    }
    
    .article-card:hover {
      transform: translateY(-8px);
      border-color: var(--primary-color);
      box-shadow: 0 15px 40px rgba(0, 212, 255, 0.2);
      background: var(--card-bg);
    }
    
    .article-card a {
      text-decoration: none;
      color: inherit;
      display: block;
    }
    
    .article-title {
      color: var(--primary-color);
      font-weight: 600;
      font-size: 1.3rem;
      margin-bottom: 0.8rem;
      line-height: 1.6;
      transition: all 0.3s ease;
    }
    
    .article-card:hover .article-title {
      color: var(--secondary-color);
    }
    
    .article-meta {
      color: var(--text-lighter);
      font-size: 0.9rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .article-meta span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .articles-grid {
      display: grid;
      gap: 1.5rem;
    }
    
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-lighter);
    }
    
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 212, 255, 0.2);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error-message {
      background: rgba(255, 0, 110, 0.1);
      border: 1px solid var(--secondary-color);
      color: var(--secondary-color);
      padding: 1.5rem;
      border-radius: 8px;
      margin: 2rem 0;
    }
    
    /* Footer */
    footer {
      background: var(--bg-darker);
      border-top: 1px solid rgba(0, 212, 255, 0.1);
      color: var(--text-lighter);
      padding: 2rem 0;
      text-align: center;
      margin-top: 3rem;
    }
    
    footer a {
      color: var(--primary-color);
      text-decoration: none;
      transition: all 0.3s ease;
    }
    
    footer a:hover {
      color: var(--secondary-color);
    }
    
    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      h2 { font-size: 1.5rem; }
      h3 { font-size: 1.1rem; }
      
      .section-title {
        font-size: 1.8rem;
      }
      
      section {
        padding: 2rem 0;
      }
      
      .article-title {
        font-size: 1.1rem;
      }
    }
  </style>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>

<script defer>
  // Update year
  document.getElementById('year').textContent = new Date().getFullYear();
  
  // Fetch Medium articles
  async function fetchMediumArticles() {
    const mediumUsername = 'aman.ag220';
    const container = document.getElementById('articles-container');
    
    try {
      // Using RSS to JSON API
      const feedUrl = `https://medium.com/@${mediumUsername}/feed`;
      const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`;
      
      const response = await fetch(apiUrl);
      
      if (!response.ok) {
        throw new Error('Failed to fetch articles');
      }
      
      const data = await response.json();
      
      if (data.status !== 'ok' || !data.items || data.items.length === 0) {
        throw new Error('No articles found');
      }
      
      // Clear loading state
      container.innerHTML = '';
      
      // Display each article
      data.items.forEach((item, index) => {
        // Clean up the title
        const title = item.title.replace(/ - Medium$/, '').trim();
        const link = item.link;
        const pubDate = new Date(item.pubDate).toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
        
        // Extract description preview
        let description = item.description || '';
        description = description.replace(/<[^>]*>/g, ''); // Remove HTML tags
        description = description.substring(0, 200) + (description.length > 200 ? '...' : '');
        
        const articleCard = document.createElement('div');
        articleCard.className = 'article-card';
        articleCard.style.opacity = '0';
        articleCard.style.transform = 'translateY(20px)';
        
        articleCard.innerHTML = `
          <a href="${link}" target="_blank" rel="noopener noreferrer">
            <div class="article-title">
              <i class="fas fa-newspaper"></i> ${title}
            </div>
            <div class="article-meta">
              <span><i class="fas fa-calendar"></i> ${pubDate}</span>
              <span><i class="fas fa-arrow-right"></i> Read on Medium</span>
            </div>
            ${description ? `<p style="color: var(--text-lighter); margin-top: 1rem; font-size: 0.95rem;">${description}</p>` : ''}
          </a>
        `;
        
        container.appendChild(articleCard);
        
        // Animate in
        setTimeout(() => {
          articleCard.style.transition = 'all 0.6s ease';
          articleCard.style.opacity = '1';
          articleCard.style.transform = 'translateY(0)';
        }, index * 100);
      });
      
    } catch (error) {
      console.error('Error fetching articles:', error);
      container.innerHTML = `
        <div class="error-message">
          <i class="fas fa-exclamation-circle"></i> Unable to load articles at the moment.
          <br>
          <a href="https://medium.com/@aman.ag220" target="_blank" rel="noopener noreferrer" style="color: var(--primary-color);">
            Visit my Medium profile directly →
          </a>
        </div>
      `;
    }
  }
  
  // Fetch articles when page loads
  document.addEventListener('DOMContentLoaded', fetchMediumArticles);
</script>
