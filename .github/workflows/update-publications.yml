name: Update Publications from Google Scholar

on:
  schedule:
    # Run on the 1st of every month at 00:00 UTC
    - cron: '0 0 1 * *'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  update-publications:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scholarly beautifulsoup4 requests

      - name: Fetch publications from Google Scholar
        run: python scripts/fetch_publications.py

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          if git diff --quiet data/publications.json; then
            echo "No changes in publications"
          else
            git add data/publications.json
            git commit -m "chore: update publications from Google Scholar [skip ci]"
            git push
          fi

      - name: Sync sitemap if needed
        run: |
          # Optional: Update sitemap with latest publication date
          echo "Publications synchronized at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
